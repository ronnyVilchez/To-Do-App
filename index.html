<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script defer src="./main.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">
  <title>To-Do App</title>
</head>

<body>

<div class="container">

  <header class="header">
    <h1>Pendientes Barrio Tuman</h1>
    <button id="darkMode" class="toggle">🌙</button>
  </header>

  <nav class="tabs">
    <button id="todos" class="tab active">TODO</button>
    <button id="activas" class="tab">PENDIENTE</button>
    <button id="completas" class="tab">COMPLETADO</button>
  </nav>

  <form class="form">
    <div class="input-group">
      <input type="text" class="addTasks" placeholder="Agregar pendiente...">
      <button type="submit" class="bt_Add">Agregar</button>
    </div>
  </form>

  <ul class="lista"></ul>

  <button class="button" id="button">
    <i class="fa-solid fa-trash"></i> Eliminar Todo
  </button>

</div>

</body>
</html>
